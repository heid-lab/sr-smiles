name: CI

on:
  push:
    branches: [ main, clean-up-repo ]
  pull_request:
    branches: [ main, clean-up-repo ]

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Poetry
        run: pip install "poetry>=1.8.0"

      - name: Install dependencies
        run: poetry install --with dev --extras "rxnmapper"

  lint:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Poetry
        run: pip install "poetry>=1.8.0"

      - name: Install dependencies
        run: poetry install --with dev

      - name: Run pre-commit
        run: poetry run pre-commit run --all-files --show-diff-on-failure

  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.12"
            rdkit-version: "2025.03.5"
          - python-version: "3.12"
            rdkit-version: "2024.09.5"

          - python-version: "3.11"
            rdkit-version: "2025.03.5"
          - python-version: "3.11"
            rdkit-version: "2024.03.5"
          - python-version: "3.11"
            rdkit-version: "2023.09.5"

          - python-version: "3.10"
            rdkit-version: "2025.03.5"

          - python-version: "3.9"
            rdkit-version: "2025.03.5"

    needs: setup
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        run: pip install "poetry>=1.8.0"

      - name: Install RDKit
        run: conda install -c conda-forge python=${{ matrix.python-version }} rdkit=${{ matrix.rdkit-version }} -y

      - name: Install dependencies
        run: poetry install --with dev --extras "rxnmapper"

      - name: Run pytest
        run: poetry run pytest --cov=src/sr_smiles --cov-report=term-missing
